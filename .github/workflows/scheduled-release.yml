name: Scheduled Release

on:
  schedule:
    - cron: '0 9 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits and tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure we have tags fetched
          git fetch --tags

          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            echo "No previous tags found. Starting from v1.0.0."
            NEW_TAG="v1.0.0"
          else
            # Check for new commits since the latest tag
            NEW_COMMITS=$(git log ${LATEST_TAG}..HEAD --oneline)

            if [ -z "$NEW_COMMITS" ]; then
              echo "No new commits since last release, skipping"
              exit 0
            fi

            echo "New commits found since $LATEST_TAG"

            # Extract version components
            # Assuming format like v1.2.3
            VERSION=${LATEST_TAG#v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)

            # Handle cases where tag doesn't match format perfectly
            if [ -z "$MAJOR" ]; then MAJOR=0; fi
            if [ -z "$MINOR" ]; then MINOR=0; fi
            if [ -z "$PATCH" ]; then PATCH=0; fi

            # Increment patch version
            NEW_PATCH=$((PATCH + 1))
            NEW_TAG="v$MAJOR.$MINOR.$NEW_PATCH"
          fi

          echo "Creating new tag: $NEW_TAG"

          # Set git config (required for tagging)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create and push the new tag
          git tag $NEW_TAG
          git push origin $NEW_TAG

          echo "Pushed tag $NEW_TAG. This should trigger the release workflow."
